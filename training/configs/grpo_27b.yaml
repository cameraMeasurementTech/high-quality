# Serious GRPO run on the production 27B coder. Plan on 4–8× H100/H200.

model_name_or_path: "handsometiger0202/Qwen-3.6-27B-AstroWolf"
sft_adapter_path: "data/checkpoints/sft_27b/final"
dataset_path: "data/hf/grpo_train/dataset"
output_dir: "data/checkpoints/grpo_27b"

use_lora: true
load_in_4bit: true
lora_r: 16
lora_alpha: 32

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
num_generations: 4
max_completion_length: 16384
temperature: 0.7
beta: 0.03
use_vllm: true
gradient_checkpointing: true

reward_mode: s1
w_s1: 0.45
w_fmt: 0.05
judge_base_url: "http://127.0.0.1:8002/v1"
judge_model: "zai-org/GLM-4.6V-Flash"

logging_steps: 5
save_steps: 50
save_total_limit: 3
report_to: wandb
