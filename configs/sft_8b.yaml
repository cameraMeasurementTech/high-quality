# Cost-effective SFT warm-start (iterate here before 27B).
# Base: swap to any Qwen2.5-VL / Qwen3-VL Instruct with commercial license.

model_name_or_path: "Qwen/Qwen2.5-VL-7B-Instruct"
dataset_path: "data/hf/sft_train/dataset"
output_dir: "data/checkpoints/sft_8b"

use_lora: true
load_in_4bit: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
warmup_ratio: 0.03
lr_scheduler_type: cosine
max_seq_length: 12288
gradient_checkpointing: true
attn_implementation: sdpa

logging_steps: 10
save_steps: 200
save_total_limit: 3
report_to: none
dataloader_num_workers: 2

# Uncomment for a cheap dry-run:
# max_samples: 64
