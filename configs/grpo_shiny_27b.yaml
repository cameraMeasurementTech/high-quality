# GRPO on pre-trained shiny-guide AstroWolf (skip SFT).
# Override HF id: export MODEL_PATH=/path/to/AstroWolf

model_name_or_path: "Tooony133/Qwen-3.6-27B-AstroWolf"
# sft_adapter_path: null   # omit — start from production weights
dataset_path: "data/hf/grpo_shiny/dataset"
output_dir: "data/checkpoints/grpo_shiny_27b"

use_lora: true
load_in_4bit: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
num_generations: 4
max_completion_length: 16384
temperature: 0.7
beta: 0.03
use_vllm: true
gradient_checkpointing: true

reward_mode: cheap   # cheap | render | s1 — start cheap, then s1 + GLM judge
w_s1: 0.45
w_fmt: 0.05
# judge_base_url: "http://127.0.0.1:8002/v1"
# judge_model: "zai-org/GLM-4.6V-Flash"

logging_steps: 5
save_steps: 50
save_total_limit: 3
report_to: none

# max_samples: 128
