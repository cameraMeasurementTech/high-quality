# DPO after SFT warm-start. Offline preference pairs from scored candidates or duels.
# Cheaper than GRPO (no online rollouts) but needs pre-built chosen/rejected pairs.

model_name_or_path: "Qwen/Qwen2.5-VL-7B-Instruct"
sft_adapter_path: "data/checkpoints/sft_8b/final"
dataset_path: "data/hf/dpo_train/dataset"
output_dir: "data/checkpoints/dpo_8b"

use_lora: true
load_in_4bit: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
warmup_ratio: 0.03
lr_scheduler_type: cosine
beta: 0.1
max_completion_length: 12288
gradient_checkpointing: true
attn_implementation: sdpa

logging_steps: 10
save_steps: 100
save_total_limit: 3
report_to: none
dataloader_num_workers: 2

# max_samples: 64
