# Continue SFT from the production coder checkpoint (best ROI for beating king).
# Requires ~2–4× H100 80GB with QLoRA.

model_name_or_path: "handsometiger0202/Qwen-3.6-27B-AstroWolf"
dataset_path: "data/hf/sft_train/dataset"
output_dir: "data/checkpoints/sft_27b"

use_lora: true
load_in_4bit: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 8.0e-6
warmup_ratio: 0.03
lr_scheduler_type: cosine
max_seq_length: 16384
gradient_checkpointing: true
attn_implementation: sdpa

logging_steps: 5
save_steps: 100
save_total_limit: 3
report_to: none
dataloader_num_workers: 2
