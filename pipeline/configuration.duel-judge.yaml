# Duel-judge profile — score sample_0 vs sample_1 with production multiview logic.
# Same stack as subnet validators: validate → multiview render → DINO → S1–S4 AB/BA.
#
# No vLLM coder. OpenRouter for judge. Chromium sidecars for renders.
# Tuned for 4× H200 boxes (more sidecars; embedder on cuda:0 after coder vLLM stopped).
#
# Usage (after stop-native.sh):
#   export CONFIG_FILE=$TRAINING/pipeline/configuration.duel-judge.yaml
#   export PYTHONPATH=$SHINY_GUIDE_ROOT/pipeline_service:$PYTHONPATH
#   python scripts/duel_score_candidates.py ...

api:
  host: "127.0.0.1"
  port: 10006
  debug: false

pipeline:
  refinement_enabled: false
  use_planner: false
  skip_render: true  # scoring script renders itself; unused by GenerationPipeline here

benchmark: false
warmup: false

llm_clients:
  openrouter:
    enabled: true
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"
  coder-instance:
    enabled: false
    base_url: "http://localhost:8001/v1"
    api_key: "local"

actors:
  # SettingsConf always validates coder+critic clients even when unused for scoring.
  coder:
    client: "openrouter"
    model: "google/gemini-2.5-pro-preview"
    workers: 1
    multimodal: true
  critic:
    client: "openrouter"
    model: "google/gemini-2.5-pro-preview"
    workers: 1
  judge:
    client: "openrouter"
    model: "google/gemini-2.5-pro-preview"
    workers: 16
    queue_size: 32
    max_tokens: 8192
    temperature: 0.0
    seed: 42
  checker:
    workers: 16
    queue_size: 32
  renderer:
    workers: 32
    queue_size: 64

js_checker:
  execution_timeout_ms: 5000
  node_binary: "node"

renderer:
  sidecar_host: "127.0.0.1"
  sidecar_port: 8013
  startup_timeout_s: 120.0
  request_timeout_s: 120.0
  node_binary: "node"
  img_size: 518
  grid_gap: 5
  sidecar_count: 16
  static_port_base: 13100
  pool_size: 2
  judge_multiview: true
  render_timeout_ms: 90000
  protocol_timeout_ms: 90000

embedder:
  enabled: true
  model_id: "facebook/dinov3-vits16-pretrain-lvd1689m"
  revision: "main"
  device: "cuda:0"
  batch_size: 32
